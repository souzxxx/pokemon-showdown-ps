services:
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  battle:
    build: ./backend
    environment:
      PORT: 3001
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  users:
    build: ./backend/users
    environment:
      PORT: 8001
      DATABASE_URL: file:./data/prod.db
      AUTH0_DOMAIN: ${AUTH0_DOMAIN}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
    volumes:
      - users_data:/app/data

  gateway:
    build: ./backend/gateway
    environment:
      PORT: 8000
      BATTLE_SERVICE_URL: http://battle:3001
      USERS_SERVICE_URL: http://users:8001
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    depends_on:
      - battle
      - users

  frontend:
    build:
      context: ./frontend
      args:
        VITE_AUTH0_DOMAIN: ${VITE_AUTH0_DOMAIN}
        VITE_AUTH0_CLIENT_ID: ${VITE_AUTH0_CLIENT_ID}
        VITE_AUTH0_AUDIENCE: ${VITE_AUTH0_AUDIENCE}
        VITE_AUTH0_REDIRECT_URI: ${VITE_AUTH0_REDIRECT_URI}
        VITE_GATEWAY_BASE_URL: ${VITE_GATEWAY_BASE_URL}
        VITE_USERS_API_BASE_URL: ${VITE_USERS_API_BASE_URL}
    depends_on:
      - gateway

  proxy:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - /home/ubuntu/ssl:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - gateway

volumes:
  users_data:
